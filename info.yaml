# Tiny Tapeout project information
project:
  title:        "Hardware Accelerator"
  author:       "elaina"
  discord:      "" 
  description:  "16-bit MAC hardware accelerator with custom ISA and 8-register file"
  language:     "Verilog"
  clock_hz:     10000000       

  # How many tiles your design occupies?
  tiles: "1x1"          

  # Your top module name:
  top_module:  "tt_um_hardware_accelerator"

  source_files:
    - "project.v"

# The pinout of your project. 
# Version 6 requires 'ui', 'uo', and 'uio' keys.
pinout:
  ui[0]: "Op A[0]"
  ui[1]: "Op A[1]"
  ui[2]: "Op A[2]"
  ui[3]: "Op A[3]"
  ui[4]: "Op A[4]"
  ui[5]: "Op A[5]"
  ui[6]: "Op A[6]"
  ui[7]: "Op A[7]"

  uo[0]: "Result[0]"
  uo[1]: "Result[1]"
  uo[2]: "Result[2]"
  uo[3]: "Result[3]"
  uo[4]: "Result[4]"
  uo[5]: "Result[5]"
  uo[6]: "Result[6]"
  uo[7]: "Result[7]"

  uio[0]: "Op B[0]"
  uio[1]: "Op B[1]"
  uio[2]: "Op B[2]"
  uio[3]: "Op B[3]"
  uio[4]: "Op B[4]"
  uio[5]: "Op B[5]"
  uio[6]: "Op B[6]"
  uio[7]: "Op B[7]"

# Do not change!
yaml_version: 6
