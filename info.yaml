# Tiny Tapeout project information
project:
  title:        "5-Floor Elevator Controller"      # Project title
  author:       "elaina"      # Your name
  discord:      ""      # Your discord username (optional)
  description:  "Elevator controller state machine with floor requests and visible delays"      # Updated description
  language:     "Verilog" 
  clock_hz:     10000000       # Updated to 10MHz (standard TT clock)

  # How many tiles your design occupies?
  tiles: "1x1"          

  # Your top module name:
  top_module:  "tt_um_elevator_controller"

  source_files:
    - "project.v"

# The pinout of your project.
pinout:
  # Inputs (ui)
  ui[0]: "Cabin Select Floor 0"
  ui[1]: "Cabin Select Floor 1"
  ui[2]: "Cabin Select Floor 2"
  ui[3]: "Cabin Select Floor 3"
  ui[4]: "Cabin Select Floor 4"
  ui[5]: "Hall Call Up 0"
  ui[6]: "Hall Call Up 1"
  ui[7]: "Hall Call Up 2"

  # Outputs (uo)
  uo[0]: "Floor Bit 0"
  uo[1]: "Floor Bit 1"
  uo[2]: "Floor Bit 2"
  uo[3]: "Moving Up LED"
  uo[4]: "Moving Down LED"
  uo[5]: "Door Open (Blink)"
  uo[6]: "OLED SCL (Pass)"
  uo[7]: "OLED SDA (GND)"

  # Bidirectional pins (uio) - Used as additional inputs
  uio[0]: "Hall Call Up 3"
  uio[1]: "Hall Call Down 1"
  uio[2]: "Hall Call Down 2"
  uio[3]: "Hall Call Down 3"
  uio[4]: "Hall Call Down 4"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
