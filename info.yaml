# Tiny Tapeout project information
project:
  title:        "Hardware Accelerator"
  author:       "elaina"
  discord:      "" 
  description:  "16-bit MAC hardware accelerator with custom ISA and 8-register file"
  language:     "Verilog"
  clock_hz:     10000000       

  # How many tiles your design occupies?
  tiles: "1x1"          

  # Your top module name:
  top_module:  "tt_um_hardware_accelerator"

  source_files:
    - "project.v"

# The pinout of your project.
pinout:
  # Inputs (ui_in) 
  ui_in[0]: "Op A[0]"
  ui_in[1]: "Op A[1]"
  ui_in[2]: "Op A[2]"
  ui_in[3]: "Op A[3]"
  ui_in[4]: "Op A[4]"
  ui_in[5]: "Op A[5]"
  ui_in[6]: "Op A[6]"
  ui_in[7]: "Op A[7]"

  # Outputs (uo_out)
  uo_out[0]: "Result[0]"
  uo_out[1]: "Result[1]"
  uo_out[2]: "Result[2]"
  uo_out[3]: "Result[3]"
  uo_out[4]: "Result[4]"
  uo_out[5]: "Result[5]"
  uo_out[6]: "Result[6]"
  uo_out[7]: "Result[7]"

  # Bidirectional pins (uio_in/out)
  uio_in[0]: "Op B[0]"
  uio_in[1]: "Op B[1]"
  uio_in[2]: "Op B[2]"
  uio_in[3]: "Op B[3]"
  uio_in[4]: "Op B[4]"
  uio_in[5]: "Op B[5]"
  uio_in[6]: "Op B[6]"
  uio_in[7]: "Op B[7]"

# Do not change!
yaml_version: 6
